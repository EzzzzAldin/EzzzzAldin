name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: EzzzzAldin

          # 🕒 Timezone
          config_timezone: Africa/Cairo

          # 🎨 Visual style
          template: classic
          config_display: large
          config_octicon: true
          config_background: transparent

          # 🧱 Content (هادئ ومهني)
          base: header, activity, repositories, metadata
          repositories_affiliations: owner

          # 🪪 Header branding
          header_title: "Ezz Aldin"
          header_subtitle: "Software Engineer | Full Stack Developer"
          header_emoji: 🚀

          # ⚡ Activity (خفيف وجمالي)
          plugin_activity: true
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_visibility: all
